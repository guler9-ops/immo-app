// ─── HELPERS ─────────────────────────────────────────────────────
const fmt = (n) => new Intl.NumberFormat('de-DE', { style:'currency', currency:'EUR' }).format(n||0);
const fmtSize = (b) => { if(!b) return '–'; if(b<1024*1024) return `${(b/1024).toFixed(0)} KB`; return `${(b/1024/1024).toFixed(1)} MB`; };
const typeIcon = (n) => { const e=n?.split('.').pop()?.toLowerCase(); if(e==='pdf') return '📄'; if(['doc','docx'].includes(e)) return '📝'; if(['xls','xlsx'].includes(e)) return '📊'; return '📁'; };

function Badge({color, children}) {
  const classes = { green:'bg-green-100 text-green-800', yellow:'bg-yellow-100 text-yellow-800', red:'bg-red-100 text-red-800', blue:'bg-blue-100 text-blue-800', gray:'bg-gray-100 text-gray-700' };
  return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${classes[color]||classes.gray}`}>{children}</span>;
}

function Modal({title, onClose, children, footer}) {
  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="flex items-center justify-between p-5 border-b">
          <h2 className="text-lg font-semibold">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-2xl leading-none">✕</button>
        </div>
        <div className="p-5 space-y-3">{children}</div>
        {footer && <div className="flex justify-end gap-2 p-5 border-t">{footer}</div>}
      </div>
    </div>
  );
}

function Input({label, ...props}) {
  return <div><label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
    <input className="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" {...props}/></div>;
}
function Select({label, children, ...props}) {
  return <div><label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
    <select className="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500" {...props}>{children}</select></div>;
}

function BtnPrimary({children, ...p}) { return <button className="inline-flex items-center gap-1.5 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors" {...p}>{children}</button>; }
function BtnSec({children, ...p}) { return <button className="inline-flex items-center gap-1.5 px-4 py-2 bg-white text-gray-700 border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors" {...p}>{children}</button>; }

function Properties({data, setData}) {
  const [modal, setModal] = useState(null);
  const EMPTY = {name:'',address:'',city:'',zip:'',type:'Mehrfamilienhaus',purchase_price:'',purchase_date:'',notes:''};
  const [form, setForm] = useState(EMPTY);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const save = () => {
    if(modal==='create') setData(d=>({...d,properties:[...d.properties,{...form,id:Date.now(),unit_count:0}]}));
    else setData(d=>({...d,properties:d.properties.map(p=>p.id===form.id?{...form}:p)}));
    setModal(null);
  };
  const del = (id) => { if(confirm('Objekt löschen?')) setData(d=>({...d,properties:d.properties.filter(p=>p.id!==id)})); };

  return (
    <div className="p-8 max-w-6xl mx-auto space-y-6">
      <div className="flex items-center justify-between">
        <div><h1 className="text-2xl font-bold">Objekte</h1><p className="text-gray-500 text-sm mt-1">{data.properties.length} Objekte</p></div>
        <BtnPrimary onClick={()=>{setForm(EMPTY);setModal('create');}}>+ Objekt anlegen</BtnPrimary>
      </div>
      <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-4">
        {data.properties.map(p=>(
          <div key={p.id} className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm hover:shadow-md transition-shadow">
            <div className="flex items-start justify-between mb-2">
              <div><h3 className="font-semibold">{p.name}</h3><p className="text-sm text-gray-500">{p.type}</p></div>
              <Badge color="blue">{p.unit_count} Einh.</Badge>
            </div>
            <p className="text-sm text-gray-600">{p.address}</p>
            <p className="text-sm text-gray-600">{p.zip} {p.city}</p>
            {p.purchase_price && <p className="text-sm text-gray-500 mt-2">Kaufpreis: {fmt(p.purchase_price)}</p>}
            <div className="flex gap-2 mt-4">
              <button className="text-xs text-blue-600 hover:underline px-2 py-1 border border-blue-200 rounded-lg hover:bg-blue-50" onClick={()=>{setForm({...p});setModal('edit');}}>Bearbeiten</button>
              <button className="text-xs text-red-500 hover:underline px-2 py-1 border border-red-200 rounded-lg hover:bg-red-50" onClick={()=>del(p.id)}>Löschen</button>
            </div>
          </div>
        ))}
      </div>
      {modal && (
        <Modal title={modal==='create'?'Objekt anlegen':'Objekt bearbeiten'} onClose={()=>setModal(null)} footer={<><BtnSec onClick={()=>setModal(null)}>Abbrechen</BtnSec><BtnPrimary onClick={save}>Speichern</BtnPrimary></>}>
          <div className="grid grid-cols-2 gap-3">
            <div className="col-span-2"><Input label="Bezeichnung *" value={form.name} onChange={e=>set('name',e.target.value)}/></div>
            <div className="col-span-2"><Input label="Straße & Nr. *" value={form.address} onChange={e=>set('address',e.target.value)}/></div>
            <Input label="PLZ *" value={form.zip} onChange={e=>set('zip',e.target.value)}/>
            <Input label="Stadt *" value={form.city} onChange={e=>set('city',e.target.value)}/>
            <Select label="Typ" value={form.type} onChange={e=>set('type',e.target.value)}>
              {['Mehrfamilienhaus','Einfamilienhaus','Wohnanlage','Gewerbe','Sonstiges'].map(t=><option key={t}>{t}</option>)}
            </Select>
            <Input label="Kaufpreis (€)" type="number" value={form.purchase_price} onChange={e=>set('purchase_price',e.target.value)}/>
            <Input label="Kaufdatum" type="date" value={form.purchase_date} onChange={e=>set('purchase_date',e.target.value)}/>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Units({data, setData}) {
  const [modal, setModal] = useState(null);
  const [filter, setFilter] = useState('');
  const EMPTY = {property_id:'',name:'',type:'Wohnung',floor:'',size_sqm:'',rooms:'',rent_cold:'',rent_utilities:'',notes:''};
  const [form, setForm] = useState(EMPTY);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const filtered = filter ? data.units.filter(u=>u.property_id===Number(filter)) : data.units;

  const save = () => {
    const prop = data.properties.find(p=>p.id===Number(form.property_id));
    if(modal==='create') setData(d=>({...d,units:[...d.units,{...form,id:Date.now(),property_name:prop?.name||'',tenant_name:null}]}));
    else setData(d=>({...d,units:d.units.map(u=>u.id===form.id?{...form,property_name:prop?.name||u.property_name}:u)}));
    setModal(null);
  };
  const del = (id) => { if(confirm('Einheit löschen?')) setData(d=>({...d,units:d.units.filter(u=>u.id!==id)})); };

  return (
    <div className="p-8 max-w-6xl mx-auto space-y-6">
      <div className="flex items-center justify-between">
        <div><h1 className="text-2xl font-bold">Einheiten</h1><p className="text-gray-500 text-sm mt-1">{filtered.length} Einheiten</p></div>
        <div className="flex gap-3">
          <select className="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white" value={filter} onChange={e=>setFilter(e.target.value)}>
            <option value="">Alle Objekte</option>
            {data.properties.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <BtnPrimary onClick={()=>{setForm(EMPTY);setModal('create');}}>+ Einheit anlegen</BtnPrimary>
        </div>
      </div>
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">

    const row = {...form,id:Date.now(),property_name:prop?.name||''};
    if(modal==='create') setData(d=>({...d,utility_bills:[row,...d.utility_bills]}));
    else setData(d=>({...d,utility_bills:d.utility_bills.map(b=>b.id===form.id?row:b)}));
    setModal(null);
  };
  const del = (id) => { if(confirm('Abrechnung löschen?')) setData(d=>({...d,utility_bills:d.utility_bills.filter(b=>b.id!==id)})); };

  const total = (b) => [b.total_heating,b.total_water,b.total_maintenance,b.total_insurance,b.total_other].reduce((s,v)=>s+(Number(v)||0),0);
  const statusColor = {draft:'yellow',sent:'blue',finalized:'green'};
  const statusLabel = {draft:'Entwurf',sent:'Verschickt',finalized:'Abgeschlossen'};

  return (
    <div className="p-8 max-w-6xl mx-auto space-y-6">
      <div className="flex items-center justify-between">
        <div><h1 className="text-2xl font-bold">Nebenkostenabrechnung</h1><p className="text-gray-500 text-sm mt-1">Betriebskostenabrechnung auf Knopfdruck</p></div>
        <BtnPrimary onClick={()=>{setForm(EMPTY);setModal('create');}}>+ Abrechnung anlegen</BtnPrimary>
      </div>
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-gray-50"><tr>
            {['Objekt','Jahr','Zeitraum','Heizung','Wasser','Gesamt','Status',''].map(h=><th key={h} className="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wide">{h}</th>)}
          </tr></thead>
          <tbody>
            {data.utility_bills.map(b=>(
              <tr key={b.id} className="border-t border-gray-100">
                <td className="px-4 py-3 font-medium">{b.property_name}</td>
                <td className="px-4 py-3">{b.year}</td>
                <td className="px-4 py-3 text-gray-600 text-xs">{b.period_from} – {b.period_to}</td>
                <td className="px-4 py-3">{fmt(b.total_heating)}</td>
                <td className="px-4 py-3">{fmt(b.total_water)}</td>
                <td className="px-4 py-3 font-semibold">{fmt(total(b))}</td>
                <td className="px-4 py-3"><Badge color={statusColor[b.status]}>{statusLabel[b.status]}</Badge></td>
                <td className="px-4 py-3">
                  <button className="text-green-600 hover:underline text-xs mr-2" onClick={()=>setDetail(b)}>Ansehen</button>
                  <button className="text-blue-600 hover:underline text-xs mr-2" onClick={()=>{setForm({...b});setModal('edit');}}>Bearbeiten</button>
                  <button className="text-red-500 hover:underline text-xs" onClick={()=>del(b.id)}>Löschen</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {modal && (
        <Modal title={modal==='create'?'Abrechnung anlegen':'Abrechnung bearbeiten'} onClose={()=>setModal(null)} footer={<><BtnSec onClick={()=>setModal(null)}>Abbrechen</BtnSec><BtnPrimary onClick={save}>Speichern</BtnPrimary></>}>
          <div className="grid grid-cols-2 gap-3">
            <div className="col-span-2"><Select label="Objekt *" value={form.property_id} onChange={e=>set('property_id',e.target.value)}>
              <option value="">Bitte wählen</option>
              {data.properties.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </Select></div>
            <Input label="Jahr" type="number" value={form.year} onChange={e=>set('year',e.target.value)}/>
            <Select label="Status" value={form.status} onChange={e=>set('status',e.target.value)}>
              <option value="draft">Entwurf</option><option value="sent">Verschickt</option><option value="finalized">Abgeschlossen</option>
            </Select>
            <Input label="Von" type="date" value={form.period_from} onChange={e=>set('period_from',e.target.value)}/>
            <Input label="Bis" type="date" value={form.period_to} onChange={e=>set('period_to',e.target.value)}/>
            <Input label="Heizkosten (€)" type="number" value={form.total_heating} onChange={e=>set('total_heating',e.target.value)}/>
            <Input label="Wasserkosten (€)" type="number" value={form.total_water} onChange={e=>set('total_water',e.target.value)}/>
            <Input label="Instandhaltung (€)" type="number" value={form.total_maintenance} onChange={e=>set('total_maintenance',e.target.value)}/>
            <Input label="Versicherung (€)" type="number" value={form.total_insurance} onChange={e=>set('total_insurance',e.target.value)}/>
            <Input label="Sonstiges (€)" type="number" value={form.total_other} onChange={e=>set('total_other',e.target.value)}/>
            <div className="flex items-end"><div className="bg-blue-50 rounded-lg px-4 py-2 w-full border border-blue-100">
              <p className="text-xs text-blue-600">Gesamt</p>
              <p className="text-lg font-bold text-blue-700">{fmt(['total_heating','total_water','total_maintenance','total_insurance','total_other'].reduce((s,k)=>s+(Number(form[k])||0),0))}</p>
            </div></div>
          </div>
        </Modal>
      )}
      {detail && (
        <Modal title={`Abrechnung ${detail.year} – ${detail.property_name}`} onClose={()=>setDetail(null)} footer={<BtnSec onClick={()=>setDetail(null)}>Schließen</BtnSec>}>
          <p className="text-sm text-gray-500">Zeitraum: {detail.period_from} bis {detail.period_to}</p>
          <div className="bg-gray-50 rounded-lg p-4 space-y-2">
            {[['Heizkosten',detail.total_heating],['Wasserkosten',detail.total_water],['Instandhaltung',detail.total_maintenance],['Versicherung',detail.total_insurance],['Sonstiges',detail.total_other]].filter(([,v])=>v>0).map(([l,v])=>(
              <div key={l} className="flex justify-between text-sm"><span className="text-gray-600">{l}</span><span>{fmt(v)}</span></div>
            ))}
            <div className="flex justify-between font-bold border-t pt-2"><span>Gesamt</span><span>{fmt(total(detail))}</span></div>
          </div>
          <div className="bg-blue-50 rounded-lg p-3 text-sm">
            <p className="font-medium text-blue-800 mb-1">💡 Automatische Verteilung nach m²</p>
            <p className="text-blue-600 text-xs">In der Vollversion wird der Betrag automatisch nach Wohnfläche auf alle Einheiten verteilt und die Nachzahlung/Guthaben je Mieter berechnet.</p>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Documents({data, setData}) {
  const [catFilter, setCatFilter] = useState('');
  const cats = ['Mietvertrag','Nebenkostenabrechnung','Korrespondenz','Versicherung','Rechnung','Protokoll','Sonstiges'];
  const filtered = catFilter ? data.documents.filter(d=>d.category===catFilter) : data.documents;
  const del = (id) => { if(confirm('Dokument löschen?')) setData(d=>({...d,documents:d.documents.filter(doc=>doc.id!==id)})); };

  return (
    <div className="p-8 max-w-6xl mx-auto space-y-6">
      <div className="flex items-center justify-between">
        <div><h1 className="text-2xl font-bold">Dokumente</h1><p className="text-gray-500 text-sm mt-1">{data.documents.length} Dokumente</p></div>
        <BtnPrimary onClick={()=>alert('In der Demo nicht verfügbar.\nIn der Vollversion können echte Dateien hochgeladen werden.')}>+ Hochladen</BtnPrimary>
      </div>
      <div className="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-colors" onClick={()=>alert('In der Demo nicht verfügbar.\nIn der Vollversion: PDF, Word, Excel, Bilder bis 10 MB.')}>
        <p className="text-3xl mb-2">📤</p>
        <p className="text-gray-500">Datei hierher ziehen oder klicken</p>
        <p className="text-xs text-gray-400 mt-1">PDF, Word, Excel, Bilder – max. 10 MB</p>
      </div>
      <div className="flex flex-wrap gap-2">
        <button onClick={()=>setCatFilter('')} className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium cursor-pointer border ${!catFilter?'bg-blue-100 text-blue-800 border-blue-200':'bg-gray-100 text-gray-700 border-gray-200'}`}>Alle</button>
        {cats.map(c=><button key={c} onClick={()=>setCatFilter(c)} className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium cursor-pointer border ${catFilter===c?'bg-blue-100 text-blue-800 border-blue-200':'bg-gray-100 text-gray-700 border-gray-200'}`}>{c}</button>)}
      </div>
      <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-4">
        {filtered.map(d=>(
          <div key={d.id} className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm hover:shadow-md transition-shadow">
            <div className="flex items-start gap-3">
              <span className="text-3xl">{typeIcon(d.filename)}</span>
              <div className="flex-1 min-w-0">
                <p className="font-medium text-gray-900 truncate">{d.name}</p>
                <p className="text-xs text-gray-500">{d.category} · {fmtSize(d.size)}</p>
                <p className="text-xs text-gray-400">{d.created_at}</p>
              </div>
            </div>
            {d.notes && <p className="text-sm text-gray-500 mt-2">{d.notes}</p>}
            <div className="flex gap-2 mt-3">
              <button className="flex-1 text-center text-xs text-gray-600 border border-gray-200 rounded-lg py-1.5 hover:bg-gray-50" onClick={()=>alert('In der Demo nicht verfügbar.\nIn der Vollversion: echte Datei herunterladen.')}>⬇️ Herunterladen</button>
              <button className="text-xs text-red-600 border border-red-200 rounded-lg px-3 hover:bg-red-50" onClick={()=>del(d.id)}>Löschen</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Messages({data, setData}) {
  const [modal, setModal] = useState(false);
  const [selected, setSelected] = useState(data.messages[0]||null);
  const EMPTY = {tenant_id:'',type:'email',subject:'',content:''};
  const [form, setForm] = useState(EMPTY);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const typeIcon2 = t => ({email:'📧',brief:'✉️',sms:'📱',notiz:'📝'}[t]||'📨');
  const typeLabel2 = t => ({email:'E-Mail',brief:'Brief',sms:'SMS',notiz:'Notiz'}[t]||t);

  const templates = {
    email:'Sehr geehrte/r [Mieter],\n\nhiermit möchten wir Sie über folgendes informieren:\n\n[Inhalt]\n\nMit freundlichen Grüßen\nIhr Vermieter',
    brief:'[Ort], den [Datum]\n\nBetr.: [Betreff]\n\nSehr geehrte/r [Mieter],\n\n[Inhalt]\n\nMit freundlichen Grüßen\n\n[Unterschrift]',
    sms:'Guten Tag [Mieter], [Inhalt]. Bei Fragen: [Telefon]',
  };

  const save = () => {
    const tenant = data.tenants.find(t=>t.id===Number(form.tenant_id));
    const row = {...form,id:Date.now(),tenant_name:tenant?`${tenant.first_name} ${tenant.last_name}`:'Allgemein',sent_at:new Date().toISOString()};
    setData(d=>({...d,messages:[row,...d.messages]}));
    setSelected(row); setModal(false);
  };
  const del = (id) => { if(confirm('Nachricht löschen?')){ setData(d=>({...d,messages:d.messages.filter(m=>m.id!==id)})); if(selected?.id===id) setSelected(null); }};

  return (
    <div className="p-8 max-w-6xl mx-auto space-y-6">
      <div className="flex items-center justify-between">
        <div><h1 className="text-2xl font-bold">Kommunikation</h1><p className="text-gray-500 text-sm mt-1">Briefe, E-Mails & SMS an Mieter</p></div>
        <BtnPrimary onClick={()=>{setForm(EMPTY);setModal(true);}}>+ Nachricht erstellen</BtnPrimary>
      </div>
      <div className="grid lg:grid-cols-3 gap-6" style={{minHeight:400}}>
        <div className="lg:col-span-1 space-y-2">
          {data.messages.length===0 && <div className="bg-white rounded-xl border p-8 text-center text-gray-400"><p className="text-3xl mb-2">✉️</p>Noch keine Nachrichten</div>}
          {data.messages.map(m=>(
            <div key={m.id} onClick={()=>setSelected(m)}
              className={`bg-white rounded-xl border p-4 cursor-pointer hover:shadow-md transition-all ${selected?.id===m.id?'border-blue-400 bg-blue-50':''}`}>
              <div className="flex items-start gap-2">
                <span className="text-xl">{typeIcon2(m.type)}</span>
                <div className="flex-1 min-w-0">
                  <p className="font-medium text-sm truncate">{m.subject}</p>
                  <p className="text-xs text-gray-500">{m.tenant_name}</p>
                  <p className="text-xs text-gray-400">{m.sent_at?.split('T')[0]}</p>
                </div>
                <span className="inline-flex items-center px-2 py-0.5 rounded-full text-xs bg-gray-100 text-gray-600">{typeLabel2(m.type)}</span>
              </div>
            </div>
          ))}
        </div>
        <div className="lg:col-span-2">
          {selected ? (
            <div className="bg-white rounded-xl border border-gray-200 p-6 h-full shadow-sm">
              <div className="flex items-start justify-between mb-4">
                <div>
                  <h2 className="text-lg font-semibold">{selected.subject}</h2>
                  <p className="text-sm text-gray-500">{typeIcon2(selected.type)} {typeLabel2(selected.type)} · {selected.tenant_name} · {selected.sent_at?.split('T')[0]}</p>
                </div>
                <button onClick={()=>del(selected.id)} className="text-red-500 hover:underline text-sm">Löschen</button>
              </div>
              <div className="bg-gray-50 rounded-lg p-4 whitespace-pre-wrap text-sm text-gray-800 leading-relaxed">{selected.content}</div>
            </div>
          ) : (
            <div className="bg-white rounded-xl border border-gray-200 flex items-center justify-center h-64 text-center shadow-sm">
              <div><p className="text-4xl mb-3">📬</p><p className="text-gray-500">Wähle eine Nachricht aus</p></div>
            </div>
          )}
        </div>
      </div>
      {modal && (
        <Modal title="Nachricht erstellen" onClose={()=>setModal(false)} footer={<><BtnSec onClick={()=>setModal(false)}>Abbrechen</BtnSec><BtnPrimary onClick={save}>✉️ Speichern</BtnPrimary></>}>
          <div className="grid grid-cols-2 gap-3">
            <Select label="Empfänger" value={form.tenant_id} onChange={e=>set('tenant_id',e.target.value)}>
              <option value="">Alle / Allgemein</option>
              {data.tenants.map(t=><option key={t.id} value={t.id}>{t.first_name} {t.last_name}</option>)}
            </Select>
            <Select label="Art" value={form.type} onChange={e=>set('type',e.target.value)}>
              <option value="email">📧 E-Mail</option><option value="brief">✉️ Brief</option><option value="sms">📱 SMS</option><option value="notiz">📝 Notiz</option>
            </Select>
            <div className="col-span-2"><Input label="Betreff *" value={form.subject} onChange={e=>set('subject',e.target.value)}/></div>
            <div className="col-span-2">
              <div className="flex justify-between items-center mb-1">
                <label className="text-sm font-medium text-gray-700">Inhalt *</label>
                <button type="button" className="text-xs text-blue-600 hover:underline" onClick={()=>set('content',templates[form.type]||'')}>Vorlage einfügen</button>
              </div>
              <textarea className="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" rows={7} value={form.content} onChange={e=>set('content',e.target.value)}/>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────
const NAV = [
  {id:'dashboard',icon:'📊',label:'Dashboard'},
  {id:'objekte',icon:'🏢',label:'Objekte'},
  {id:'einheiten',icon:'🚪',label:'Einheiten'},
  {id:'mieter',icon:'👥',label:'Mieter'},
  {id:'mietvertraege',icon:'📄',label:'Mietverträge'},
  {id:'finanzen',icon:'💶',label:'Finanzen'},
  {id:'zaehler',icon:'⚡',label:'Zählerstände'},
  {id:'nebenkosten',icon:'🧾',label:'Nebenkosten'},
  {id:'dokumente',icon:'📁',label:'Dokumente'},
  {id:'kommunikation',icon:'✉️',label:'Kommunikation'},
];

function App() {
  const [page, setPage] = useState('dashboard');
  const [open, setOpen] = useState(true);
  const [data, setData] = useState(MOCK);

  const pages = {
    dashboard: <Dashboard/>,
    objekte: <Properties data={data} setData={setData}/>,
    einheiten: <Units data={data} setData={setData}/>,
    mieter: <Tenants data={data} setData={setData}/>,
    mietvertraege: <Leases data={data} setData={setData}/>,
    finanzen: <Finances data={data} setData={setData}/>,
    zaehler: <MeterReadings data={data} setData={setData}/>,
    nebenkosten: <UtilityBilling data={data} setData={setData}/>,
    dokumente: <Documents data={data} setData={setData}/>,
    kommunikation: <Messages data={data} setData={setData}/>,
  };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {/* Sidebar */}
      <aside style={{width:open?220:64,background:'#0f172a',color:'#fff',display:'flex',flexDirection:'column',transition:'width .2s',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'20px 16px',borderBottom:'1px solid #1e293b'}}>
          <span style={{fontSize:24}}>🏠</span>
          {open && <span style={{fontWeight:700,fontSize:17,letterSpacing:'-0.5px'}}>ImmoApp</span>}
        </div>
        <nav style={{flex:1,padding:'12px 8px',overflowY:'auto'}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)}
              style={{display:'flex',alignItems:'center',gap:12,width:'100%',padding:'10px 12px',borderRadius:8,marginBottom:2,border:'none',cursor:'pointer',textAlign:'left',background:page===n.id?'#2563eb':'transparent',color:page===n.id?'#fff':'#94a3b8',transition:'all .15s',fontSize:14}}>
              <span style={{fontSize:18,flexShrink:0}}>{n.icon}</span>
              {open && <span>{n.label}</span>}
            </button>
          ))}
        </nav>
        <button onClick={()=>setOpen(!open)}
          style={{display:'flex',alignItems:'center',gap:8,padding:'16px',borderTop:'1px solid #1e293b',background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:13}}>
          <span>{open?'◀':'▶'}</span>{open&&<span>Einklappen</span>}
        </button>
      </aside>
      {/* Content */}
      <main style={{flex:1,overflowY:'auto'}}>
        {/* Demo-Banner */}
        <div style={{background:'#fef3c7',borderBottom:'1px solid #fcd34d',padding:'8px 24px',display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#92400e'}}>
          <span>⚠️</span>
          <span><strong>Demo-Version</strong> – Daten werden nur im Browser gespeichert und gehen beim Schließen verloren. Für echte Datenhaltung: Vollversion starten (STARTEN.md).</span>
        </div>
        {pages[page]}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
