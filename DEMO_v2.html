function openEditNka(id) {
  const b = D.nka.find(x=>x.id===id); if (!b) return;
  openMo('Abrechnung bearbeiten', `
    <div class="fld"><label>Objekt</label><select id="nkaobj">${D.props.map(p=>`<option${p.name===b.obj?' selected':''}>${p.name}</option>`).join('')}</select></div>
    <div class="mo-2col">
      <div class="fld"><label>Abrechnungsjahr</label><input id="nkajahr" type="number" value="${b.jahr}" min="2000" max="2099"></div>
      <div class="fld"><label>Status</label><select id="nkastatus">
        <option value="draft"${b.status==='draft'?' selected':''}>Entwurf</option>
        <option value="sent"${b.status==='sent'?' selected':''}>Verschickt</option>
        <option value="finalized"${b.status==='finalized'?' selected':''}>Abgeschlossen</option>
      </select></div>
    </div>
  `, () => {
    Object.assign(b, {obj:gv('nkaobj'), jahr:+gv('nkajahr'), status:gv('nkastatus')});
    closeMo(); render();
  });
}

function renderNka() {
  const sl = {sent:'Verschickt', finalized:'Abgeschlossen', draft:'Entwurf'};
  const sc = {sent:'b', finalized:'g', draft:'y'};

  // Aktuell gewählte Abrechnung
  if (selNka >= D.nka.length) selNka = 0;
  const sel = D.nka[selNka];

  // NKA-Liste mit Klick-Auswahl + Bearbeiten
  const rows = D.nka.map((b,i) => `<tr style="${i===selNka?'background:#eff6ff;':''}cursor:pointer" onclick="selNka=${i};render()">
    <td style="padding:10px 12px"><strong>${b.obj}</strong></td>
    <td style="padding:10px 12px">${b.jahr}</td>
    <td style="padding:10px 12px"><span class="bdg ${sc[b.status]}">${sl[b.status]}</span></td>
    <td style="padding:10px 12px;font-size:11px;color:#64748b">Wohnfläche (m²)</td>
    <td style="padding:10px 12px">
      <button class="icon-btn" onclick="event.stopPropagation();openEditNka(${b.id})">✏️</button>
      <button class="icon-btn" onclick="event.stopPropagation();if(confirm('Abrechnung löschen?')){D.nka=D.nka.filter(x=>x.id!==${b.id});if(selNka>=D.nka.length)selNka=0;render()}">🗑</button>
    </td>
  </tr>`).join('');

  // Dynamisch: Kosten + Einheiten zum gewählten Objekt
  const detail = sel ? (() => {
    const importedCosts = D.costs.filter(c => c.alloc && c.obj === sel.obj);
    const totalKosten   = importedCosts.reduce((s,c)=>s+c.amount, 0);
    const objUnits      = D.units.filter(u => u.prop === sel.obj).map(u => {
      const tenant = D.tenants.find(t => t.unit === u.name);
      return { name: u.name, sqm: u.sqm||0, tenant: tenant?.name||'(Leerstand)', nkVoraus: tenant?.nk||0 };
    });
    const totalSqm = objUnits.reduce((s,u)=>s+u.sqm, 0);

    const kostRows = importedCosts.length
      ? importedCosts.map(c=>`
          <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #dbeafe;color:#374151">
            <span>${c.date} · ${c.label}</span>
            <span style="font-weight:600">${fmt(c.amount)}</span>
          </div>`).join('')
      : '<p style="font-size:12px;color:#94a3b8;margin:0">Keine umlagefähigen Kosten für dieses Objekt erfasst.</p>';

    const unitRows = objUnits.length
      ? objUnits.map(u => {
          const share   = totalSqm > 0 ? u.sqm / totalSqm : 0;
          const anteil  = totalKosten * share;
          const prepaid = u.nkVoraus * 12;
          const diff    = prepaid - anteil;
          return `<div style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f8fafc">
              <div>
                <div style="font-weight:600;font-size:13px">${u.name}</div>
                <div style="font-size:11px;color:#64748b">${u.tenant} · ${u.sqm} m² · Anteil ${(share*100).toFixed(1)} %</div>
              </div>
              <div style="text-align:right">
                <div style="font-weight:700;font-size:14px">${fmt(anteil)}</div>
                <div style="font-size:11px;font-weight:600;color:${diff>=0?'#15803d':'#dc2626'}">
                  ${diff>=0?'+':''} ${fmt(Math.abs(diff))} ${diff>=0?'Guthaben':'Nachzahlung'}
                </div>
              </div>
            </div>
            <div style="padding:8px 14px;background:#fff;font-size:11px;color:#64748b">
              Vorauszahlungen (${u.nkVoraus} € × 12 Mte.) = ${fmt(prepaid)}
            </div>
          </div>`;
        }).join('')
      : '<p style="font-size:12px;color:#94a3b8">Keine Einheiten für dieses Objekt gefunden.</p>';

    return `
    <div class="card" style="background:#eff6ff;border-color:#bfdbfe;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:13px;font-weight:700;color:#1e40af">
          📥 Importierte Kosten – ${sel.obj} (${sel.jahr})
        </div>
        <span class="bdg ${sc[sel.status]}">${sl[sel.status]}</span>
      </div>
      ${kostRows}
      <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:#1e40af;border-top:1px solid #bfdbfe;margin-top:8px;padding-top:8px">
        <span>Gesamt umlagefähig</span><span>${fmt(totalKosten)}</span>
      </div>
      <div style="font-size:11px;color:#64748b;margin-top:4px">Verteilerschlüssel: Wohnfläche (m²) · ${totalSqm} m² gesamt</div>
    </div>
    <div style="font-size:14px;font-weight:600;color:#0f172a;margin-bottom:12px">📊 Verteilung auf Einheiten – ${sel.obj}</div>
    ${unitRows}`;
  })() : '<p style="color:#94a3b8;font-size:13px">Keine Abrechnung ausgewählt.</p>';

  return `<div class="hdr"><div><h1>Nebenkostenabrechnung</h1>
    <p class="sub">Kosten werden automatisch aus dem Kosten-Modul importiert · Abrechnung anklicken zum Anzeigen</p></div>
    <button class="btn-p" onclick="openNewNka()">+ Abrechnung anlegen</button></div>

  <div class="card" style="padding:0;overflow:hidden;margin-bottom:14px">
    <table><thead><tr><th>Objekt</th><th>Jahr</th><th>Status</th><th>Schlüssel</th><th></th></tr></thead>
    <tbody>${rows || '<tr><td colspan="5" style="padding:16px;text-align:center;color:#94a3b8">Noch keine Abrechnungen angelegt.</td></tr>'}</tbody></table>
  </div>

  ${detail}`;
}

function renderDok() {
  const cats = ['Mietvertrag','Nebenkostenabrechnung','Versicherung','Rechnung','Protokoll'];
  const filtered = docCat ? D.docs.filter(d => d.cat===docCat) : D.docs;
  const pills = ['<button class="pill'+(docCat===''?' on':'')+'" onclick="docCat=\'\';render()">Alle</button>',
    ...cats.map(c => `<button class="pill${docCat===c?' on':''}" onclick="docCat='${c}';render()">${c}</button>`)].join('');
  const cards = filtered.map(d => `
    <div class="dok-c">
      <div class="dok-top">
        <span style="font-size:28px">📄</span>
        <div style="min-width:0">
          <div class="dok-name">${d.name}</div>
          <div class="dok-meta">${d.cat} · ${d.size} · ${d.date}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-s" style="flex:1;justify-content:center;font-size:12px">⬇️ Herunterladen</button>
        <button class="btn-s" style="font-size:12px;color:#ef4444" onclick="if(confirm('Dokument löschen?')){D.docs=D.docs.filter(x=>x.id!==${d.id});render()}">🗑</button>
      </div>

  return `<div class="hdr"><div><h1>Dokumente</h1><p class="sub">${D.docs.length} Dokumente</p></div>

  <div class="dok-grid">${cards}</div>`;
}

function renderKomm() {
  const icons = {'E-Mail':'📧','Brief':'✉️','SMS':'📱'};
  const list = D.msgs.map((m,i) => `
    <div class="msg-item${selMsg===i?' sel':''}" onclick="selMsg=${i};render()">
      <div class="mt">${icons[m.typ]||'📨'} ${m.betreff}</div>
      <div class="mm">${m.empf} · ${m.datum}</div>

  const detail = sel ? `
    <div class="card">

function renderKost() {
  const totalAll = D.costs.reduce((s,c) => s+c.amount,0);
  const totalAlloc = D.costs.filter(c=>c.alloc).reduce((s,c)=>s+c.amount,0);
  const totalNot = D.costs.filter(c=>!c.alloc).reduce((s,c)=>s+c.amount,0);
  const rows = D.costs.map(c => `<tr>

  <div class="kpis" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi"><span style="font-size:22px">💸</span><div><div class="kv" style="font-size:16px">${fmt(totalAll)}</div><div class="kl">Gesamtkosten 2026</div></div></div>
    <div class="kpi"><span style="font-size:22px">✅</span><div><div class="kv" style="font-size:16px;color:#15803d">${fmt(totalAlloc)}</div><div class="kl">Umlagefähig (§ 2 BetrKV)</div></div></div>

    </table>
  </div>`;
}

function renderBankVergleich() {
  const kp = KV.kp, ek = KV.ek, tilg = KV.tilg, lz = KV.lz;
  const kredit   = Math.max(0, kp - ek);
  const ltv      = kp > 0 ? kredit / kp * 100 : 0;
  const ekPct    = kp > 0 ? ek / kp * 100 : 0;
  const n        = lz * 12;

  // Annuität: monatliche Rate
  function annuitaet(K, zinsPa) {
    const z = zinsPa / 100 / 12;
    if (z <= 0 || K <= 0 || n <= 0) return 0;
    return K * z * Math.pow(1+z,n) / (Math.pow(1+z,n) - 1);
  }

  // Aufschlag je Laufzeit & LTV

function renderBank() {
  const totalSumme    = D.kredite.reduce((s,k)=>s+k.summe,0);
  const totalRestschuld = D.kredite.reduce((s,k)=>s+k.restschuld,0);
  const totalRate     = D.kredite.reduce((s,k)=>s+k.rate,0);

  const cards = D.kredite.map(k => {
    const tilgungJahr = k.summe * (k.tilgung/100);
    const zinsenJahr  = k.restschuld * (k.zinsen/100);
    const tilgungAnteil = k.rate > 0 ? ((k.rate - zinsenJahr/12) / k.rate * 100).toFixed(0) : 0;
    const zinsenAnteil  = 100 - +tilgungAnteil;
    const progress = k.summe > 0 ? ((k.summe - k.restschuld)/k.summe*100).toFixed(1) : 0;
    return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <div style="font-weight:700;font-size:15px;color:#0f172a">${k.bank}</div>

        </div>
        <div style="background:#fef3c7;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:11px;color:#92400e;margin-bottom:3px">Restschuld</div>
          <div style="font-weight:700;font-size:14px;color:#b45309">${fmt(k.restschuld)}</div>

        <div style="background:#dcfce7;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:11px;color:#15803d;margin-bottom:3px">Tilgung p.a.</div>
          <div style="font-weight:700;font-size:14px;color:#15803d">${k.tilgung} %</div>
        </div>
        <div style="background:#eff6ff;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:11px;color:#1d4ed8;margin-bottom:3px">Zinssatz p.a.</div>
          <div style="font-weight:700;font-size:14px;color:#1d4ed8">${k.zinsen} %</div>
        </div>
      </div>

      <!-- Monatliche Rate Aufschlüsselung -->
      <div style="background:#f1f5f9;border-radius:8px;padding:12px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:12px;font-weight:600;color:#475569">Monatliche Rate</span>

        </div>
        <div style="height:8px;border-radius:4px;overflow:hidden;background:#e2e8f0;display:flex;margin-bottom:6px">
          <div style="background:#16a34a;width:${tilgungAnteil}%;transition:width .3s"></div>
          <div style="background:#ef4444;width:${zinsenAnteil}%;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px">
          <span style="color:#15803d">🟢 Tilgung ${fmt((k.rate*(+tilgungAnteil/100)))}/Monat (${tilgungAnteil}%)</span>
          <span style="color:#dc2626">🔴 Zinsen ${fmt((k.rate*(zinsenAnteil/100)))}/Monat (${zinsenAnteil}%)</span>
        </div>
      </div>

      <!-- Rückzahlungsfortschritt -->
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:4px">
          <span>Abbezahlt</span><span>${progress} %</span>
        </div>
        <div style="height:6px;border-radius:3px;overflow:hidden;background:#e2e8f0">
          <div style="background:#3b82f6;width:${progress}%;height:100%;border-radius:3px"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;margin-top:2px">
          <span>Start: ${k.startdatum}</span>
          <span>Laufzeit: ${k.laufzeit} Jahre</span>
        </div>

      <div style="display:flex;gap:8px;padding-top:10px;border-top:1px solid #f1f5f9">

// ─── Modal System ─────────────────────────────────────────────────────────
let _moSaveFn = null;
function openMo(title, bodyHtml, saveFn) {
  document.getElementById('mo-title').textContent = title;
  document.getElementById('mo-body').innerHTML = bodyHtml;
  _moSaveFn = saveFn;
  document.getElementById('mo').style.display = 'flex';
}
function closeMo() { document.getElementById('mo').style.display = 'none'; _moSaveFn = null; }
function moSave() { if (_moSaveFn) _moSaveFn(); }
function gv(id) { const e = document.getElementById(id); return e ? e.value : ''; }
function nextId(arr) { return arr.length ? Math.max(...arr.map(x=>x.id))+1 : 1; }
const today = () => new Date().toISOString().slice(0,10);

const CATS_ALLOC = [
  {v:'grundsteuer',l:'Grundsteuer'},{v:'heizung',l:'Heizungsanlage / Brennstoff'},
  {v:'wasser',l:'Wasserversorgung / Warmwasser'},{v:'aufzug',l:'Aufzug'},
  {v:'strassenreinigung',l:'Straßenreinigung'},{v:'muell',l:'Müllbeseitigung / Müllabfuhr'},
  {v:'hauswart',l:'Hauswart / Hausmeister'},{v:'gartenpflege',l:'Gartenpflege / Grünpflege'},
  {v:'versicherung',l:'Gebäude- & Haftpflichtversicherung'},{v:'allgstrom',l:'Allgemeinstrom / Beleuchtung'},
  {v:'schornstein',l:'Schornsteinreinigung'},{v:'sonstige',l:'Sonstige Betriebskosten (§ 2 Nr. 17)'},
];
const CATS_NOT = [
  {v:'instandhaltung',l:'Instandhaltung / Reparaturen'},{v:'verwaltung',l:'Hausverwaltungskosten'},
  {v:'abschreibung',l:'Abschreibungen (AfA)'},{v:'fremdkapital',l:'Finanzierungskosten / Zinsen'},
];
const propOpts = () => D.props.map(p=>`<option value="${p.name}">${p.name}</option>`).join('');
const unitOpts = () => D.units.map(u=>`<option value="${u.name}">${u.name} (${u.prop})</option>`).join('');

    <div class="fld"><label>Objekt</label><select id="cobj">

      ${D.props.map(p=>`<option${p.name===c.obj?' selected':''}>${p.name}</option>`).join('')}

function _costData() {
  const catRaw = gv('ccat'); const [v, allocStr] = catRaw.split('|');

  return { date: gv('cdate'), amount: +gv('camt'), cat: v, label: catObj?.l||v, desc: gv('cdesc'), obj: gv('cobj'), alloc: allocStr==='1' };

    <div class="mo-2col">
      <div class="fld"><label>Abrechnungsjahr</label><input id="nkajahr" type="number" value="${new Date().getFullYear()-1}" min="2000" max="2099"></div>
      <div class="fld"><label>Status</label><select id="nkastatus"><option value="draft">Entwurf</option><option value="sent">Verschickt</option><option value="finalized">Abgeschlossen</option></select></div>
    </div>
  `, () => {
    D.nka.push({ id: nextId(D.nka), obj: gv('nkaobj'), jahr: +gv('nkajahr'), status: gv('nkastatus'), heiz:0, wasser:0, inst:0, vers:0 });
    closeMo(); render();
  });
}

// Build nav
const navEl = document.getElementById('nav');
navEl.innerHTML = NAV.map(n =>
  `<button class="nb${n.id===cur?' on':''}" data-id="${n.id}" onclick="navigate('${n.id}')"><span class="ico">${n.ico}</span>${n.lbl}</button>`
).join('');

render();
</script>
<div id="mo" style="display:none" class="mo" onclick="if(event.target===this)closeMo()">
  <div class="mo-box">
    <div class="mo-head">
      <h2 id="mo-title">–</h2>
      <button onclick="closeMo()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8;line-height:1;padding:0">✕</button>
    </div>
    <div id="mo-body" class="mo-body"></div>
    <div class="mo-foot">
      <button class="btn-s" onclick="closeMo()">Abbrechen</button>
      <button class="btn-p" onclick="moSave()">💾 Speichern</button>
    </div>
  </div>
</div>
</body>
</html>
